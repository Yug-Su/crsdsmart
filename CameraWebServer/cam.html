<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Camera Stream</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
        }
        #stream {
            max-width: 100%;
            border: 2px solid #fff;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 Camera Stream</h1>
        <img id="stream" src="">
    </div>
    <script>
        const streamImg = document.getElementById('stream');
        const streamUrl = window.location.protocol + '//' + window.location.hostname + ':81/stream';
        streamImg.src = streamUrl;
    </script>
</body>
</html>
